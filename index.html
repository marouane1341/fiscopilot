<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V4.1 - AI Experts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f8fafc; margin: 0; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { color: #d4af37; transform: scale(1.1); filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.5)); }
        .chat-msg { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#0b1120]/95 backdrop-blur-xl">
        <div>
            <h1 class="text-2xl font-black text-transparent bg-clip-text gold-gradient tracking-tighter italic">FiscoPilot</h1>
            <p class="text-slate-500 text-[8px] uppercase tracking-[0.4em] font-black italic">Syllabus Master V4.1</p>
        </div>
        <div class="w-10 h-10 rounded-2xl gold-gradient flex items-center justify-center text-slate-900 font-black shadow-lg shadow-yellow-500/20">M</div>
    </header>

    <main id="app-content" class="px-5 space-y-7">
        
        <section id="view-home" class="space-y-6">
            <div class="glass rounded-[2.5rem] p-8 border-t border-white/10 shadow-2xl">
                <h2 class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.3em] mb-4">Statut Master</h2>
                <div class="flex items-end justify-between mb-3">
                    <span class="text-4xl font-black text-white">72<span class="text-sm font-light text-slate-500 ml-1">%</span></span>
                    <span class="text-[10px] text-slate-400 uppercase font-bold italic tracking-tighter text-right">Analyse & Audit<br>Completés</span>
                </div>
                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden border border-white/5">
                    <div class="gold-gradient h-full w-[72%] transition-all duration-1000 shadow-[0_0_15px_rgba(212,175,55,0.4)]"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div onclick="changeTab('ai')" class="glass rounded-3xl p-6 flex items-center gap-5 border border-yellow-500/20 active:scale-95 transition shadow-xl">
                    <span class="text-4xl">🤖</span>
                    <div class="text-left">
                        <span class="block text-xs font-black uppercase text-white tracking-widest">Consultation IA</span>
                        <span class="text-[10px] text-slate-500 italic">Interrogez vos 3 experts ITAA</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-ai" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-black text-white italic">Agents Experts</h2>
                <button onclick="clearChat()" class="text-[10px] text-slate-500 uppercase font-bold hover:text-red-400 transition">Effacer</button>
            </div>
            
            <div class="glass rounded-[2rem] p-6 space-y-5 border-t border-white/10 shadow-2xl flex flex-col h-[500px]">
                <select id="ai-expert" class="w-full bg-slate-900/80 border border-slate-700 rounded-2xl px-5 py-4 text-xs text-yellow-500 font-black outline-none appearance-none shadow-inner ring-1 ring-white/5">
                    <option value="compta">🏢 Expert-Comptable (BE-GAAP)</option>
                    <option value="fisc">💰 Fiscaliste Certifié (TVA/ISoc)</option>
                    <option value="juridique">⚖️ Juriste d'Affaires (CSA)</option>
                </select>
                
                <div id="chat-window" class="flex-1 overflow-y-auto space-y-4 p-2 text-[11px] scrollbar-hide">
                    <div class="chat-msg bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5 text-slate-300 italic leading-relaxed">
                        Prêt pour la révision, Marouane. Quel point du syllabus ITAA analysons-nous ?
                    </div>
                </div>

                <div class="flex gap-2 bg-slate-900/50 p-2 rounded-2xl border border-white/10 shadow-inner">
                    <input type="text" id="ai-query" placeholder="Question sur le programme..." class="flex-1 bg-transparent px-3 text-xs outline-none text-white">
                    <button onclick="askAgent()" class="w-12 h-12 gold-gradient rounded-xl flex items-center justify-center text-slate-900 shadow-lg active:scale-90 transition">➔</button>
                </div>
            </div>
        </section>

        <section id="view-calc" class="hidden space-y-6">
            <h2 class="text-xl font-black px-2 text-white italic">Bibliothèque</h2>
            <div class="grid grid-cols-1 gap-4">
                <div class="glass rounded-3xl p-6 border-l-4 border-yellow-500 flex justify-between items-center shadow-lg active:bg-white/5 transition">
                    <div><h3 class="font-bold text-sm text-white">Fiscalité & DNA</h3><p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mt-1">CIR 92 & CTVA</p></div>
                    <span class="text-2xl">💰</span>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-8 left-6 right-6 glass rounded-[2.5rem] px-8 py-5 flex justify-between items-center z-50 shadow-2xl ring-1 ring-white/10">
        <button onclick="changeTab('home')" id="btn-home" class="nav-btn active-tab transition-all"><span class="text-2xl">🏠</span></button>
        <button onclick="changeTab('ai')" id="btn-ai" class="nav-btn text-slate-500 transition-all"><span class="text-2xl">🤖</span></button>
        <button onclick="changeTab('calc')" id="btn-calc" class="nav-btn text-slate-500 transition-all"><span class="text-2xl">📊</span></button>
        <button onclick="changeTab('cours')" id="btn-cours" class="nav-btn text-slate-500 transition-all"><span class="text-2xl">🎓</span></button>
    </nav>

    <script>
        function changeTab(tabName) {
            ['view-home', 'view-ai', 'view-calc', 'view-cours'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('view-' + tabName).classList.remove('hidden');
            
            ['btn-home', 'btn-ai', 'btn-calc', 'btn-cours'].forEach(b => {
                const btn = document.getElementById(b);
                if(btn) {
                    btn.classList.remove('active-tab');
                    btn.classList.add('text-slate-500');
                }
            });
            document.getElementById('btn-' + tabName).classList.add('active-tab');
        }

        function askAgent() {
            const query = document.getElementById('ai-query').value;
            const expert = document.getElementById('ai-expert').value;
            if(!query) return;

            const win = document.getElementById('chat-window');
            win.innerHTML += `
                <div class="chat-msg flex flex-col items-end">
                    <span class="text-[8px] text-yellow-500 font-black uppercase mb-1 mr-2">Candidat</span>
                    <div class="bg-yellow-500 text-slate-900 p-3 rounded-2xl rounded-tr-none text-xs font-bold shadow-lg">${query}</div>
                </div>`;
            
            document.getElementById('ai-query').value = "";
            win.scrollTop = win.scrollHeight;

            setTimeout(() => {
                let resp = "Selon le syllabus ITAA (p. 25), ce point est crucial pour l'examen oral. Voulez-vous un résumé des articles du CSA concernés ?";
                let color = "indigo-400";
                
                if(expert === "fisc") {
                    resp = "D'un point de vue fiscal, l'Art. 45 §2 du CTVA limite la déduction à 50% pour ce type de frais. C'est une question piège classique.";
                    color = "emerald-400";
                }
                if(expert === "compta") {
                    resp = "En BE-GAAP, le principe de prudence interdit d'acter ce produit avant sa réalisation certaine. Vérifiez l'Avis CNC 2023/04.";
                    color = "blue-400";
                }

                win.innerHTML += `
                    <div class="chat-msg flex flex-col items-start mt-4">
                        <span class="text-[8px] text-${color} font-black uppercase mb-1 ml-2">Expert ${expert}</span>
                        <div class="glass p-4 rounded-2xl rounded-tl-none border border-white/10 text-white text-xs italic shadow-xl leading-relaxed">${resp}</div>
                    </div>`;
                win.scrollTop = win.scrollHeight;
            }, 1000);
        }

        function clearChat() {
            document.getElementById('chat-window').innerHTML = '<div class="chat-msg bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5 text-slate-300 italic">Historique effacé. Prêt pour une nouvelle analyse.</div>';
        }
    </script>
</body>
</html>
