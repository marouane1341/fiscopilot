<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12.9 - PRO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; border-radius: 1.5rem; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .msg-me { background: var(--gold); color: black; font-weight: 700; border-radius: 20px 0 20px 20px; padding: 20px; margin-left: 15%; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#020617]/95 backdrop-blur-md z-50">
        <h1 class="text-xl font-black text-[#d4af37] italic tracking-tighter text-white">FISCOPILOT PRO</h1>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/10 p-2 px-4 rounded-xl border border-white/10 text-xs font-bold text-white uppercase tracking-widest">⚙️ Config</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden bg-slate-900/80 p-6 rounded-3xl mb-8 border border-yellow-500/30 backdrop-blur-xl">
            <p class="text-[10px] gold-text font-bold uppercase mb-2">Clé API (Mode Pay-as-you-go)</p>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white outline-none focus:border-yellow-500">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim()); location.reload();" class="w-full py-4 gold-btn text-[10px] uppercase mt-4 tracking-widest">Activer la Version Pro</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[50vh]">
            <div class="msg-ai">
                <b class="text-[#d4af37] uppercase text-[10px] tracking-widest block mb-2">Mentor ITAA</b>
                Marouane, si la facturation est active, le blocage belge est terminé. <br><br>
                Pose-moi ta question la plus complexe sur le <b>Code des Sociétés</b> pour tester mon nouveau moteur.
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-5 right-5 max-w-2xl mx-auto flex gap-3">
        <input type="text" id="userInput" placeholder="Question fiscale..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-[2rem] text-sm text-white outline-none focus:ring-2 focus:ring-yellow-500/50">
        <button id="sendBtn" onclick="askAI()" class="w-16 h-16 gold-btn flex items-center justify-center shadow-2xl">➔</button>
    </div>

    <script>
        async function askAI() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!key || !input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            try {
                // Requête directe v1 (standard pour les comptes payants)
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es un expert-comptable belge expérimenté. Réponds avec précision et cite les textes de loi. Question : " + input }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const answer = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai mt-4"><b class="text-[#d4af37] text-[10px] uppercase tracking-widest block mb-2">Expert-Conseil</b>${answer}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg-ai mt-4 border-red-500/50 text-red-400"><b>Alerte Système :</b> ${e.message}<br><br><span class="text-[10px]">Si tu vois "Location not supported", attends 5-10 min que Google valide ta carte ou crée une NOUVELLE clé API.</span></div>`;
            } finally {
                btn.innerHTML = `➔`;
                btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
