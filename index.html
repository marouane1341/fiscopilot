<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FiscoPilot AI ELITE PRO</title>

<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#D4AF37;
}

input{
padding:12px;
width:90%;
font-size:16px;
border-radius:5px;
border:none;
}

button{

background:#D4AF37;
color:black;
padding:12px;
border:none;
margin-top:10px;
font-size:16px;
border-radius:5px;

}

#response{

margin-top:20px;
font-size:18px;

}

</style>

</head>

<body>

<h1>FiscoPilot AI ELITE 🇧🇪</h1>

<input id="question" placeholder="Pose ta question comptable">

<br>

<button onclick="askAI()">

Demander à l'IA

</button>

<div id="response">

Réponse ici

</div>


<script src="knowledge.js"></script>


<script>

function askAI(){

let question = document
.getElementById("question")
.value
.toLowerCase();

let response =
"Je n'ai pas encore cette information.";

for(let item of knowledge){

for(let word of item.keywords){

if(question.includes(word)){

response = item.answer;

}

}

}

document.getElementById("response")
.innerHTML = response;

}


// hors ligne

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>


</body>
</html>
