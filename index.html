<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V13 - Final Wallbreaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; border-radius: 1.5rem; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .msg-me { background: var(--gold); color: black; font-weight: 700; border-radius: 20px 0 20px 20px; padding: 20px; margin-left: 15%; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#020617]/95 backdrop-blur-md z-50">
        <h1 class="text-xl font-black text-[#d4af37] italic tracking-tighter">FISCOPILOT V13</h1>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/10 p-2 px-4 rounded-xl border border-white/10 text-xs font-bold text-white uppercase">⚙️ Config</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden bg-slate-900/80 p-6 rounded-3xl mb-8 border border-yellow-500/30 backdrop-blur-xl text-white">
            <p class="text-[10px] gold-text font-bold uppercase mb-2 text-[#d4af37]">Clé API Pro (Pay-as-you-go)</p>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white outline-none mb-4">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim()); location.reload();" class="w-full py-4 gold-btn text-[10px] uppercase font-bold tracking-widest">Initialiser la V13</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[50vh]">
            <div class="msg-ai">
                <b class="text-[#d4af37] uppercase text-[10px] tracking-widest block mb-2 text-white">Système Stabilisé</b>
                Marouane, la V13 intègre un moteur de recherche de modèle automatique. <br><br>
                Teste maintenant : pose une question sur la <b>sonnette d'alarme</b> ou la <b>TVA</b>.
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-5 right-5 max-w-2xl mx-auto flex gap-3">
        <input type="text" id="userInput" placeholder="Cas pratique..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-[2rem] text-sm text-white outline-none">
        <button id="sendBtn" onclick="askAI()" class="w-16 h-16 gold-btn flex items-center justify-center shadow-2xl">➔</button>
    </div>

    <script>
        async function askAI() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!key || !input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me text-black font-bold">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            // Liste des endpoints à tester en cascade
            const endpoints = [
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`
            ];

            let success = false;
            for (let url of endpoints) {
                if (success) break;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Expert-comptable belge. " + input }] }] })
                    });
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const answer = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                        chat.innerHTML += `<div class="msg-ai mt-4"><b class="text-[#d4af37] text-[10px] uppercase tracking-widest block mb-2">Mentor</b>${answer}</div>`;
                        success = true;
                    }
                } catch (e) { console.log("Echec sur un endpoint, tentative suivante..."); }
            }

            if (!success) {
                chat.innerHTML += `<div class="msg-ai mt-4 border-red-500 text-red-400"><b>Échec final :</b> Les serveurs de Google ne répondent pas encore à ta nouvelle clé. Attends 15 minutes ou vérifie que la facturation est BIEN activée dans Cloud Console.</div>`;
            }
            btn.innerHTML = `➔`;
            btn.disabled = false;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
