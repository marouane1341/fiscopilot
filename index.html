<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FiscoPilot AI ELITE PRO</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}
h1{font-size:28px;color:#D4AF37;}
button{background:#D4AF37;color:black;padding:12px;border:none;margin:5px;border-radius:5px;font-size:16px;cursor:pointer;}
input{padding:10px;width:90%;font-size:16px;margin-top:10px;border-radius:5px;border:none;}
#response{margin-top:15px;font-size:16px;color:#ffffff;}
#quiz, #flashcards{margin-top:20px;text-align:left;}
</style>
</head>
<body>

<h1>FiscoPilot AI ELITE PRO 🇧🇪</h1>

<!-- IA simulée -->
<input id="question" placeholder="Pose ta question comptable ou fiscale">
<br>
<button onclick="askAI()">Demander à l'IA</button>
<p id="response">Réponse ici</p>

<!-- Quiz ITAA -->
<div id="quiz">
<h2>Quiz ITAA</h2>
<button onclick="startQuiz()">Démarrer Quiz</button>
<div id="quiz-content"></div>
</div>

<!-- Flashcards -->
<div id="flashcards">
<h2>Flashcards</h2>
<button onclick="showFlashcard()">Afficher flashcard</button>
<p id="flashcard-content"></p>
</div>

<script src="data.js"></script>
<script>
// --- IA simulée ---
async function askAI(){

let q = document.getElementById("question").value;

document.getElementById("response").innerHTML =
"Réflexion en cours...";

let response = await fetch(
"https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium",
{
method: "POST",

headers: {
"Authorization": "Bearer hf_abcd1234xyz5678",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
"Content-Type": "application/json"
},

body: JSON.stringify({
inputs: q
})

});

let result = await response.json();

document.getElementById("response").innerHTML =
result.generated_text || "Pas de réponse";

}

// --- Quiz ---
let currentQuiz = 0;
function startQuiz(){
    currentQuiz = 0;
    showQuizQuestion();
}

function showQuizQuestion(){
    if(currentQuiz >= quizData.length){
        document.getElementById("quiz-content").innerHTML = "Quiz terminé ! ✅";
        return;
    }
    let q = quizData[currentQuiz];
    let html = `<p>${q.question}</p>`;
    q.options.forEach((opt,i)=>{
        html += `<button onclick="checkAnswer(${i})">${opt}</button>`;
    });
    document.getElementById("quiz-content").innerHTML = html;
}

function checkAnswer(i){
    let q = quizData[currentQuiz];
    if(i===q.answer) alert("✅ Correct !");
    else alert("❌ Incorrect !");
    currentQuiz++;
    showQuizQuestion();
}

// --- Flashcards ---
let currentCard = 0;
function showFlashcard(){
    document.getElementById("flashcard-content").innerHTML = 
        flashcards[currentCard].question + " → " + flashcards[currentCard].answer;
    currentCard = (currentCard +1)%flashcards.length;
}

// --- Service Worker ---
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js")
    .then(()=>console.log("Service Worker enregistré"))
    .catch(err=>console.log("Erreur SW:",err));
}
</script>

</body>
</html>
