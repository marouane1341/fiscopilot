<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FiscoPilot AI ELITE MAX 🇧🇪</title>
  <link rel="stylesheet" href="./style.css?v=200" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-logo">📚</div>
        <div>
          <div class="brand-title">FiscoPilot <span>AI ELITE MAX 🇧🇪</span></div>
          <div class="brand-sub">Version stable • Sans audio • Base premium</div>
        </div>
      </div>
      <div class="status-pill" id="netStatus">En ligne</div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Modules</h1>
      <p>
        Choisis un module. Cours + QCM + Cas, recherche et aléatoire.
      </p>
    </section>

    <section class="module-card">
      <div class="module-head">
        <div>
          <div class="module-title">📚 TVA Belgique</div>
          <div class="module-meta" id="dbStatus">Chargement de la base…</div>
        </div>
        <div class="module-counts" id="counts">Cours: 0 • QCM: 0 • Cas: 0</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="lessons">📘 Cours</button>
        <button class="tab" data-tab="qcm">🧪 QCM</button>
        <button class="tab" data-tab="cases">🧾 Cas</button>
      </div>

      <div class="toolbar">
        <input
          id="searchInput"
          type="text"
          placeholder="Rechercher (ex: prorata, facture, exonération, assujetti...)"
        />
        <button id="randomBtn" class="btn btn-secondary">Aléatoire</button>
        <button id="backToListBtn" class="btn btn-secondary hidden">Retour liste</button>
      </div>

      <div id="contentArea"></div>
    </section>
  </main>

  <script src="./app.js?v=200"></script>
</body>
</html>
