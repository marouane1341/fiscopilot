<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FiscoPilot V11.1 - Neural Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #05080a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding-bottom: 100px; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .msg-ai { background: #1e293b; border-left: 3px solid var(--gold); }
        .msg-me { background: var(--gold); color: black; font-weight: bold; margin-left: 15%; }
    </style>
</head>
<body>

    <header class="p-6 border-b border-white/10 sticky top-0 bg-[#05080a] z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-[#d4af37] italic">FISCOPILOT V11.1</h1>
            <div id="status-ia" class="text-[8px] text-red-500 font-bold uppercase">● IA Déconnectée</div>
        </div>
        <button onclick="toggleConfig()" class="text-xs bg-white/5 px-3 py-1 rounded-full border border-white/10">⚙️ Clé API</button>
    </header>

    <main class="px-5 mt-4">
        <div id="config-panel" class="hidden glass p-5 rounded-2xl mb-6 border-2 border-yellow-500/50">
            <h3 class="text-sm font-bold mb-2">Configuration du Mentor</h3>
            <input type="password" id="apiKey" placeholder="Coller votre clé API ici..." class="w-full bg-black border border-white/20 p-3 rounded-xl text-xs text-white mb-3">
            <button onclick="saveKey()" class="w-full py-2 gold-gradient text-black font-bold rounded-xl text-xs uppercase">Activer l'intelligence</button>
        </div>

        <section id="view-ai" class="view-section active">
            <div id="chat" class="space-y-4 h-[500px] overflow-y-auto pb-4 text-xs leading-relaxed">
                <div class="msg-ai p-4 rounded-2xl rounded-tl-none">
                    <b>Mentor ITAA :</b> Bonjour Marouane. Une fois ta clé activée, je pourrai analyser tes cas pratiques en profondeur. <br><br><i>Exemple : "Simule une question sur le test de liquidité en SRL".</i>
                </div>
            </div>
            
            <div class="fixed bottom-24 left-5 right-5 flex gap-2">
                <input type="text" id="userInput" placeholder="Demandez au mentor..." class="flex-1 bg-black border border-white/20 p-4 rounded-2xl text-xs text-white outline-none focus:border-yellow-500">
                <button onclick="callGemini()" class="w-14 gold-gradient rounded-2xl flex items-center justify-center text-black font-bold">➔</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black border-t border-white/10 flex justify-around items-center z-50">
        <button class="flex flex-col items-center text-[#d4af37]"><span class="text-xl">🧠</span><span class="text-[8px] font-bold">MENTOR</span></button>
        <button class="flex flex-col items-center text-gray-500 opacity-50"><span class="text-xl">📊</span><span class="text-[8px] font-bold">OUTILS</span></button>
    </nav>

    <script>
        function toggleConfig() { document.getElementById('config-panel').classList.toggle('hidden'); }

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            if(key) {
                localStorage.setItem('gemini_key', key);
                document.getElementById('status-ia').innerText = "● IA Opérationnelle";
                document.getElementById('status-ia').classList.replace('text-red-500', 'text-emerald-500');
                toggleConfig();
            }
        }

        async function callGemini() {
            const key = localStorage.getItem('gemini_key');
            const input = document.getElementById('userInput').value;
            if(!key) { alert("Configurez votre clé API d'abord !"); return; }
            if(!input) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg-me p-4 rounded-2xl rounded-tr-none">${input}</div>`;
            document.getElementById('userInput').value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es un expert-comptable belge, mentor pour l'examen de l'ITAA. Réponds avec précision, cite les articles de loi (CSA, CIR92) et sois pédagogue. Question : " + input }] }]
                    })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai p-4 rounded-2xl rounded-tl-none mt-4">${text}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg-ai p-4 rounded-2xl rounded-tl-none mt-4 text-red-400">Erreur de connexion. Vérifiez votre clé.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }

        // Init au chargement
        if(localStorage.getItem('gemini_key')) {
            document.getElementById('status-ia').innerText = "● IA Opérationnelle";
            document.getElementById('status-ia').classList.replace('text-red-500', 'text-emerald-500');
        }
    </script>
</body>
</html>
