<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12.7 - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; }
        .msg-me { background: var(--gold); color: black; font-weight: bold; border-radius: 20px 0 20px 20px; margin-left: 15%; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">
    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-slate-950/80 z-50">
        <div>
            <h1 class="text-xl font-black text-[#d4af37] italic">FISCOPILOT V12.7</h1>
            <div id="status" class="text-[9px] uppercase font-bold text-emerald-500 tracking-widest italic text-white">● Mode Connexion Directe</div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/5 p-2 rounded-xl border border-white/10 text-white">⚙️</button>
    </header>

    <main class="p-5">
        <div id="config" class="hidden bg-slate-900 p-6 rounded-3xl mb-8 border border-yellow-500/30">
            <h3 class="text-xs gold-text mb-2 uppercase font-bold text-[#d4af37]">Ta Clé API</h3>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4 outline-none">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim()); location.reload();" class="w-full py-4 gold-btn rounded-2xl text-[10px] uppercase tracking-widest">Enregistrer & Tester</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[60vh]">
            <div class="msg-ai p-5">
                <b class="text-[#d4af37]">Mentor :</b> Marouane, on ne lâche rien. <br><br>
                Vérifie que ta clé est bien enregistrée dans l'engrenage (⚙️) et pose ta question.
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-5 right-5 flex gap-3">
        <input type="text" id="userInput" placeholder="Ta question ici..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-3xl text-sm text-white outline-none focus:border-yellow-500">
        <button id="sendBtn" onclick="askGemini()" class="w-16 gold-btn rounded-3xl flex items-center justify-center">➔</button>
    </div>

    <script>
        async function askGemini() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!input || !key) { document.getElementById('config').classList.remove('hidden'); return; }

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me p-5">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            try {
                // Utilisation du modèle flash avec l'endpoint v1beta plus permissif
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es un expert-comptable belge. Réponds de façon concise à : " + input }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);
                
                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai p-5 mt-4"><b>Mentor :</b><br>${text}</div>`;
            } catch (e) {
                // Si ça échoue, on tente une dernière fois via un proxy de secours différent
                try {
                    const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`);
                    // Note: AllOrigins demande une structure différente, mais pour ne pas compliquer, 
                    // on va juste afficher l'erreur réelle pour comprendre le blocage final.
                    throw e; 
                } catch(innerE) {
                    chat.innerHTML += `<div class="msg-ai p-5 mt-4 text-red-400 border border-red-500/20">
                        <b>Erreur Système :</b> ${innerE.message}<br><br>
                        <span class="text-[10px]">Si "location not supported", il faut activer un VPN (USA/UK) sur ton téléphone.</span>
                    </div>`;
                }
            } finally {
                btn.innerHTML = `➔`;
                btn.disabled = false;
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
    </script>
</body>
</html>
