<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12.1 - Bridge Stabilizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; }
        .gold-text { color: var(--gold); }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .msg-me { background: var(--gold); color: black; font-weight: 700; border-radius: 20px 0 20px 20px; margin-left: 20%; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-28">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-black gold-text italic tracking-tighter">FISCOPILOT V12.1</h1>
            <div id="status" class="text-[9px] uppercase font-bold text-red-500 tracking-widest">Non Configuré</div>
        </div>
        <button onclick="toggleConfig()" class="bg-white/5 p-3 rounded-2xl border border-white/10 text-xl">⚙️</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden glass p-6 rounded-[2rem] mb-8 border-2 border-yellow-500/30">
            <h2 class="text-xs font-black uppercase gold-text mb-4 tracking-widest text-center">Paramètres du Serveur</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-2">URL Vercel (Pont)</label>
                    <input type="text" id="bridgeUrl" placeholder="https://fiscopilot.vercel.app" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-sm text-white mt-1 outline-none focus:border-yellow-500">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold uppercase opacity-50 ml-2">Clé API Google</label>
                    <input type="password" id="apiKey" placeholder="Votre clé AIzaSy..." class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-sm text-white mt-1 outline-none focus:border-yellow-500">
                </div>
                
                <button onclick="saveAndReload()" class="w-full py-5 gold-btn rounded-2xl text-xs uppercase tracking-[0.2em] shadow-xl hover:scale-[1.02] transition-transform">
                    Enregistrer la Configuration
                </button>
            </div>
        </div>

        <div id="chat" class="space-y-6 min-h-[50vh]">
            <div class="msg-ai p-6">
                <b class="gold-text text-[10px] uppercase tracking-widest block mb-2">Mentor Professionnel</b>
                Marouane, vérifie que le voyant est <b class="text-emerald-400">Vert</b>.<br><br>
                Si c'est le cas, je suis prêt à analyser tes problématiques fiscales et juridiques.
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-5 right-5 max-w-2xl mx-auto flex gap-3">
        <input type="text" id="userInput" placeholder="Décrivez votre cas pratique..." class="flex-1 bg-slate-900/90 border border-white/10 p-5 rounded-[2rem] text-sm text-white outline-none focus:ring-2 focus:ring-yellow-500/40 backdrop-blur-md">
        <button id="sendBtn" onclick="askAI()" class="w-16 h-16 gold-btn rounded-full flex items-center justify-center shadow-2xl hover:brightness-110">➔</button>
    </div>

    <script>
        // Chargement initial des données
        window.onload = () => {
            document.getElementById('bridgeUrl').value = localStorage.getItem('fp_bridge') || "";
            document.getElementById('apiKey').value = localStorage.getItem('fp_key') || "";
            checkStatus();
        };

        function toggleConfig() { document.getElementById('config').classList.toggle('hidden'); }

        function saveAndReload() {
            const bridge = document.getElementById('bridgeUrl').value.trim().replace(/\/$/, "");
            const key = document.getElementById('apiKey').value.trim();
            
            if(!bridge || !key) { alert("Veuillez remplir les deux champs."); return; }
            
            localStorage.setItem('fp_bridge', bridge);
            localStorage.setItem('fp_key', key);
            
            toggleConfig();
            checkStatus();
            alert("Configuration synchronisée.");
        }

        function checkStatus() {
            const status = document.getElementById('status');
            const hasBridge = localStorage.getItem('fp_bridge');
            const hasKey = localStorage.getItem('fp_key');
            
            if(hasBridge && hasKey) {
                status.innerText = "● Pont Opérationnel";
                status.classList.remove('text-red-500');
                status.classList.add('text-emerald-500');
            }
        }

        async function askAI() {
            const bridge = localStorage.getItem('fp_bridge');
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            
            if(!bridge || !key) { 
                document.getElementById('config').classList.remove('hidden');
                alert("Erreur : Pont ou Clé manquant."); 
                return; 
            }
            if(!input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            
            chat.innerHTML += `<div class="msg-me p-6 shadow-xl animate-in slide-in-from-right duration-300">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            try {
                const res = await fetch(`${bridge}/api/mentor`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, apiKey: key })
                });

                const data = await res.json();
                
                if(data.error) throw new Error(data.error);

                const answer = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `
                    <div class="msg-ai p-6 mt-4 animate-in fade-in duration-500">
                        <b class="gold-text text-[10px] uppercase tracking-widest block mb-2">Analyse Fiscale</b>
                        ${answer}
                    </div>`;
            } catch (err) {
                chat.innerHTML += `
                    <div class="msg-ai p-6 mt-4 border-red-500/50 text-red-400">
                        <b>Erreur de transmission :</b><br>
                        Vérifiez l'URL Vercel dans les paramètres.
                    </div>`;
            } finally {
                btn.innerHTML = `➔`;
                btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
