<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiscoPilot AI ELITE MAX 🇧🇪</title>
  <style>
    :root{
      --bg1:#071a2d;
      --bg2:#0c2d4b;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10);
      --text:#eef5ff;
      --muted:rgba(238,245,255,.72);
      --blue:rgba(72,145,255,.25);
      --shadow:0 20px 60px rgba(0,0,0,.28);
      --radius:22px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 10% 0%, rgba(49,120,255,.20), transparent 55%),
        radial-gradient(900px 600px at 100% 20%, rgba(0,190,255,.10), transparent 45%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(10px);
      background:rgba(5,18,32,.55);
      border-bottom:1px solid var(--stroke);
    }

    .topbar-inner{
      max-width:980px;
      margin:0 auto;
      padding:16px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-logo{
      width:48px;
      height:48px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:var(--card);
      border:1px solid var(--stroke);
      font-size:22px;
    }

    .brand-title{
      font-weight:900;
      font-size:22px;
      line-height:1.1;
    }

    .brand-title span{
      color:#f8c75e;
    }

    .brand-sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .status-pill{
      white-space:nowrap;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(52,199,124,.18);
      border:1px solid rgba(52,199,124,.24);
      font-weight:800;
      font-size:13px;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      padding:24px 14px 48px;
    }

    .hero h1{
      margin:10px 0 8px;
      font-size:62px;
      line-height:1;
    }

    .hero p{
      margin:0 0 22px;
      color:var(--muted);
      font-size:18px;
      line-height:1.5;
    }

    .module-card{
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      box-shadow:var(--shadow);
      padding:18px;
    }

    .module-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .module-title{
      font-size:42px;
      font-weight:900;
      line-height:1.05;
    }

    .module-meta{
      color:var(--muted);
      margin-top:6px;
      font-size:14px;
      white-space:pre-wrap;
    }

    .module-counts{
      color:var(--muted);
      font-weight:700;
      font-size:15px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--stroke);
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .tab{
      border:none;
      cursor:pointer;
      padding:14px 18px;
      border-radius:18px;
      background:var(--card2);
      color:var(--text);
      font-weight:900;
      font-size:18px;
      border:1px solid var(--stroke);
    }

    .tab.active{
      background:var(--blue);
      border-color:rgba(72,145,255,.35);
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    #searchInput{
      flex:1 1 320px;
      min-width:240px;
      border:none;
      outline:none;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(0,0,0,.18);
      color:var(--text);
      border:1px solid var(--stroke);
      font-size:16px;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:14px 16px;
      border-radius:18px;
      color:var(--text);
      font-weight:800;
      font-size:16px;
      border:1px solid var(--stroke);
      background:var(--card2);
    }

    .hidden{
      display:none !important;
    }

    #contentArea{
      margin-top:18px;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .list-item{
      width:100%;
      text-align:left;
      padding:18px;
      border-radius:20px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      color:var(--text);
      cursor:pointer;
    }

    .item-title{
      font-size:28px;
      font-weight:900;
      line-height:1.15;
      margin-bottom:8px;
    }

    .item-meta{
      color:var(--muted);
      font-size:14px;
      margin-bottom:10px;
    }

    .item-preview{
      color:rgba(238,245,255,.86);
      line-height:1.5;
    }

    .detail-card{
      border:1px solid var(--stroke);
      border-radius:22px;
      background:rgba(255,255,255,.05);
      padding:18px;
    }

    .detail-title{
      font-size:44px;
      font-weight:900;
      line-height:1.06;
      margin-bottom:10px;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid var(--stroke);
      color:var(--muted);
      font-weight:800;
      font-size:14px;
      margin-bottom:14px;
    }

    .detail-body{
      margin-top:10px;
      padding:18px;
      border-radius:18px;
      background:rgba(0,0,0,.16);
      border:1px solid var(--stroke);
      color:rgba(238,245,255,.94);
      line-height:1.7;
      white-space:pre-wrap;
      font-size:17px;
    }

    .nav-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .choice{
      width:100%;
      text-align:left;
      margin-top:10px;
      border:none;
      cursor:pointer;
      padding:14px 16px;
      border-radius:16px;
      color:var(--text);
      font-weight:700;
      font-size:15px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
    }

    .answer-box{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--stroke);
      line-height:1.6;
    }

    @media (max-width: 700px){
      .hero h1{font-size:46px}
      .module-title{font-size:30px}
      .item-title{font-size:22px}
      .detail-title{font-size:30px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-logo">📚</div>
        <div>
          <div class="brand-title">FiscoPilot <span>AI ELITE MAX 🇧🇪</span></div>
          <div class="brand-sub">Version stable • Sans audio • Base premium</div>
        </div>
      </div>
      <div class="status-pill" id="netStatus">En ligne</div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Modules</h1>
      <p>Choisis un module. Cours + QCM + Cas, recherche et aléatoire.</p>
    </section>

    <section class="module-card">
      <div class="module-head">
        <div>
          <div class="module-title">📚 TVA Belgique</div>
          <div class="module-meta" id="dbStatus">Chargement de la base…</div>
        </div>
        <div class="module-counts" id="counts">Cours: 0 • QCM: 0 • Cas: 0</div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="lessons">📘 Cours</button>
        <button class="tab" data-tab="qcm">🧪 QCM</button>
        <button class="tab" data-tab="cases">🧾 Cas</button>
      </div>

      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="Rechercher (ex: prorata, facture, exonération, assujetti...)" />
        <button id="randomBtn" class="btn">Aléatoire</button>
        <button id="backToListBtn" class="btn hidden">Retour liste</button>
        <button id="hardReloadBtn" class="btn">Reset cache</button>
      </div>

      <div id="contentArea"></div>
    </section>
  </main>

  <script>
    const DB_URL = "./db/tva.json?v=" + Date.now();

    let db = null;
    let currentTab = "lessons";
    let filteredItems = [];
    let currentIndex = -1;

    const $ = (selector) => document.querySelector(selector);

    function setStatus(text, ok = true) {
      const el = $("#dbStatus");
      if (!el) return;
      el.textContent = text;
      el.style.color = ok ? "rgba(238,245,255,.72)" : "#ffb4b4";
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(str) {
      return String(str ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function getCurrentCollection() {
      if (!db) return [];
      if (currentTab === "lessons") return db.lessons || [];
      if (currentTab === "qcm") return db.qcm || [];
      return db.cases || [];
    }

    function updateCounts() {
      const lessons = db?.lessons?.length || 0;
      const qcm = db?.qcm?.length || 0;
      const cases = db?.cases?.length || 0;
      $("#counts").textContent = \`Cours: \${lessons} • QCM: \${qcm} • Cas: \${cases}\`;
    }

    function previewText(item) {
      if (currentTab === "lessons") return (item.text || "").slice(0, 180);
      if (currentTab === "qcm") return item.explain || "";
      return item.question || "";
    }

    function titleText(item) {
      if (currentTab === "lessons") return item.title || "Cours";
      if (currentTab === "qcm") return item.question || "QCM";
      return item.title || "Cas";
    }

    function metaText(item, index) {
      if (currentTab === "lessons") return \`\${item.level || "—"} • \${item.id || \`cours_\${index + 1}\`}\`;
      if (currentTab === "qcm") return \`\${item.level || "—"} • QCM \${index + 1}\`;
      return \`\${item.level || "—"} • Cas \${index + 1}\`;
    }

    function renderList() {
      const content = $("#contentArea");
      const q = normalize($("#searchInput").value);
      const source = getCurrentCollection();

      filteredItems = source.filter((item) => {
        const blob = normalize(JSON.stringify(item));
        return !q || blob.includes(q);
      });

      currentIndex = -1;
      $("#backToListBtn").classList.add("hidden");

      if (!filteredItems.length) {
        content.innerHTML = \`
          <div class="detail-card">
            <div class="detail-title">Aucun résultat</div>
            <div class="detail-body">Ta recherche ne renvoie rien ou la base n'est pas chargée.</div>
          </div>
        \`;
        return;
      }

      content.innerHTML = \`
        <div class="list">
          \${filteredItems.map((item, index) => \`
            <button class="list-item" data-index="\${index}">
              <div class="item-title">\${escapeHtml(titleText(item))}</div>
              <div class="item-meta">\${escapeHtml(metaText(item, index))}</div>
              <div class="item-preview">\${escapeHtml(previewText(item))}...</div>
            </button>
          \`).join("")}
        </div>
      \`;

      content.querySelectorAll(".list-item").forEach((btn) => {
        btn.addEventListener("click", () => {
          openDetail(Number(btn.dataset.index));
        });
      });
    }

    function renderLesson(item) {
      return \`<div class="detail-body">\${escapeHtml(item.text || "")}</div>\`;
    }

    function renderQcm(item) {
      const choices = item.choices || [];
      return \`
        <div class="detail-body">\${escapeHtml(item.question || "")}</div>
        <div class="nav-row">
          \${choices.map((choice, idx) => \`
            <button class="choice" data-choice="\${idx}">
              \${idx + 1}) \${escapeHtml(choice)}
            </button>
          \`).join("")}
        </div>
        <div class="answer-box hidden" id="answerBox"></div>
      \`;
    }

    function renderCase(item) {
      return \`
        <div class="detail-body">\${escapeHtml(item.question || "")}</div>
        <div class="answer-box">
          <strong>Réponse</strong><br><br>
          \${escapeHtml(item.answer_md || "").replace(/\\n/g, "<br>")}
        </div>
      \`;
    }

    function openDetail(index) {
      currentIndex = index;
      const item = filteredItems[index];
      if (!item) return;

      $("#backToListBtn").classList.remove("hidden");

      const body =
        currentTab === "lessons"
          ? renderLesson(item)
          : currentTab === "qcm"
          ? renderQcm(item)
          : renderCase(item);

      $("#contentArea").innerHTML = \`
        <div class="detail-card">
          <div class="detail-title">\${escapeHtml(titleText(item))}</div>
          <div class="badge">\${escapeHtml(metaText(item, index))}</div>
          \${body}
          <div class="nav-row">
            <button class="btn" id="prevBtn">◀ Précédent</button>
            <button class="btn" id="nextBtn">Suivant ▶</button>
          </div>
        </div>
      \`;

      $("#prevBtn").addEventListener("click", () => stepDetail(-1));
      $("#nextBtn").addEventListener("click", () => stepDetail(1));

      if (currentTab === "qcm") {
        document.querySelectorAll("[data-choice]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const selected = Number(btn.dataset.choice);
            const isCorrect = selected === Number(item.answer);
            const box = $("#answerBox");
            box.classList.remove("hidden");
            box.innerHTML = \`
              <strong>\${isCorrect ? "✅ Bonne réponse" : "❌ Mauvaise réponse"}</strong><br><br>
              \${escapeHtml(item.explain || "")}
            \`;
          });
        });
      }
    }

    function stepDetail(delta) {
      if (!filteredItems.length) return;
      let next = currentIndex + delta;
      if (next < 0) next = filteredItems.length - 1;
      if (next >= filteredItems.length) next = 0;
      openDetail(next);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach((el) => {
        el.classList.toggle("active", el.dataset.tab === tab);
      });
      renderList();
    }

    function openRandom() {
      if (!filteredItems.length) return;
      const randomIndex = Math.floor(Math.random() * filteredItems.length);
      openDetail(randomIndex);
    }

    async function hardResetCaches() {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
          }
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          for (const key of keys) {
            await caches.delete(key);
          }
        }
        alert("Caches et service workers supprimés. Recharge la page.");
      } catch (e) {
        alert("Reset cache impossible: " + e.message);
      }
    }

    async function loadDb() {
      try {
        setStatus("Chargement de la base...");
        const res = await fetch(DB_URL, { cache: "no-store" });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        if (!data || !Array.isArray(data.lessons) || !Array.isArray(data.qcm) || !Array.isArray(data.cases)) {
          throw new Error("Format de base invalide");
        }

        db = data;
        updateCounts();
        setStatus(\`Base chargée : \${db.meta?.title || "TVA Belgique"} • v\${db.meta?.version || "?"}\`);
        renderList();
      } catch (err) {
        console.error(err);
        setStatus("Erreur DB : " + err.message, false);
        $("#contentArea").innerHTML = \`
          <div class="detail-card">
            <div class="detail-title">Erreur de chargement</div>
            <div class="detail-body">La base n’a pas pu être chargée.

Vérifie :
- que /db/tva.json existe bien
- que GitHub Pages sert la bonne branche
- que le cache navigateur a bien été vidé
- que tu n'as plus de service worker actif</div>
          </div>
        \`;
      }
    }

    function init() {
      $("#searchInput").addEventListener("input", renderList);
      $("#randomBtn").addEventListener("click", openRandom);
      $("#backToListBtn").addEventListener("click", renderList);
      $("#hardReloadBtn").addEventListener("click", hardResetCaches);

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchTab(tab.dataset.tab));
      });

      $("#netStatus").textContent = navigator.onLine ? "En ligne" : "Hors ligne";

      loadDb();
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
