<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12.5 - Universal Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; }
        .msg-me { background: var(--gold); color: black; font-weight: bold; border-radius: 20px 0 20px 20px; margin-left: 15%; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-slate-950/80 z-50">
        <div>
            <h1 class="text-xl font-black text-[#d4af37] italic">FISCOPILOT V12.5</h1>
            <div id="status" class="text-[9px] uppercase font-bold text-red-500 tracking-widest italic">Attente Activation</div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/5 p-2 rounded-xl border border-white/10">⚙️</button>
    </header>

    <main class="p-5">
        <div id="config" class="hidden bg-slate-900 p-6 rounded-3xl mb-8 border border-yellow-500/30">
            <label class="text-[10px] font-bold uppercase text-[#d4af37]">Ta Clé API Google Studio</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4 mt-2">
            <button onclick="saveConfig()" class="w-full py-4 gold-btn rounded-2xl text-xs uppercase tracking-widest">Activer l'IA</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[60vh]">
            <div class="msg-ai p-5">
                <b class="text-[#d4af37]">Mentor :</b> Marouane, j'ai simplifié le système. <br><br>
                1. Colle ta clé dans l'engrenage.<br>
                2. Teste une question.<br>
                Si la Belgique bloque toujours, l'app te proposera un bouton "Débloquer via Proxy".
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-5 right-5 flex gap-3">
        <input type="text" id="userInput" placeholder="Pose ta question fiscale..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-3xl text-sm text-white outline-none">
        <button id="sendBtn" onclick="askGemini()" class="w-16 gold-btn rounded-3xl flex items-center justify-center shadow-xl">➔</button>
    </div>

    <script>
        function saveConfig() {
            localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim());
            document.getElementById('config').classList.add('hidden');
            updateStatus();
        }

        function updateStatus() {
            const status = document.getElementById('status');
            if(localStorage.getItem('fp_key')) {
                status.innerText = "● IA Prête"; status.className = "text-[9px] uppercase font-bold text-emerald-500 tracking-widest";
            }
        }

        async function askGemini() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!key) { document.getElementById('config').classList.remove('hidden'); return; }
            if(!input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me p-5">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            // Tentative directe avec le dernier endpoint de secours
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Expert-comptable belge. " + input }] }] })
                });

                const data = await response.json();
                if(data.error && data.error.message.includes('location')) {
                    throw new Error("LOCATION_BLOCKED");
                }

                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai p-5 mt-4"><b>Mentor :</b><br>${text}</div>`;
            } catch (e) {
                if(e.message === "LOCATION_BLOCKED") {
                    chat.innerHTML += `<div class="msg-ai p-5 mt-4 border-orange-500 border italic">
                        ⚠️ Google bloque toujours la Belgique. <br><br>
                        <button onclick="window.open('https://cors-anywhere.herokuapp.com/corsdemo')" class="bg-orange-500 text-white p-2 rounded text-[10px] font-bold">1. CLIQUE ICI POUR DÉBLOQUER</button><br>
                        Puis réessaie ta question.
                    </div>`;
                } else {
                    chat.innerHTML += `<div class="msg-ai p-5 mt-4 text-red-400">Erreur : ${e.message}</div>`;
                }
            } finally {
                btn.innerHTML = `➔`; btn.disabled = false;
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
        updateStatus();
    </script>
</body>
</html>
