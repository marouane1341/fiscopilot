<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12.6 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; }
        .msg-me { background: var(--gold); color: black; font-weight: bold; border-radius: 20px 0 20px 20px; margin-left: 15%; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">
    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-slate-950/80 z-50">
        <div>
            <h1 class="text-xl font-black text-[#d4af37] italic">FISCOPILOT V12.6</h1>
            <div id="status" class="text-[9px] uppercase font-bold text-emerald-500 tracking-widest italic">● Système Opérationnel</div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/5 p-2 rounded-xl border border-white/10">⚙️</button>
    </header>

    <main class="p-5">
        <div id="config" class="hidden bg-slate-900 p-6 rounded-3xl mb-8 border border-yellow-500/30">
            <input type="password" id="apiKey" placeholder="Clé API..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value); location.reload();" class="w-full py-4 gold-btn rounded-2xl text-xs">Sauvegarder</button>
        </div>
        <div id="chat" class="space-y-6 min-h-[60vh]">
            <div class="msg-ai p-5"><b>Mentor :</b> On y est Marouane. Le canal est ouvert. Pose ta question sur la <b>réserve de liquidation</b> pour confirmer !</div>
        </div>
    </main>

    <div class="fixed bottom-6 left-5 right-5 flex gap-3">
        <input type="text" id="userInput" placeholder="Question fiscale..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-3xl text-sm text-white outline-none">
        <button id="sendBtn" onclick="askGemini()" class="w-16 gold-btn rounded-3xl flex items-center justify-center">➔</button>
    </div>

    <script>
        async function askGemini() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!input || !key) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me p-5">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            
            try {
                // Utilisation d'un proxy CORS fiable pour éviter tout blocage
                const proxy = "https://corsproxy.io/?";
                const target = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(proxy + encodeURIComponent(target), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Expert ITAA. Réponds brièvement. Question : " + input }] }] })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai p-5 mt-4"><b>Mentor :</b><br>${text}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg-ai p-5 mt-4 text-red-400 italic">Erreur : Vérifie ta clé ou ta connexion.</div>`;
            } finally {
                btn.innerHTML = `➔`;
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
    </script>
</body>
</html>
