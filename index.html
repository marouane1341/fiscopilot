<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FiscoPilot V19 - Chrome Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; border-radius: 1.2rem; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 1.5rem 1.5rem 1.5rem; padding: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .msg-me { background: var(--gold); color: black; font-weight: 700; border-radius: 1.5rem 0 1.5rem 1.5rem; padding: 1.2rem; margin-left: 10%; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-black text-[#d4af37] italic tracking-tighter">FISCOPILOT</h1>
            <div class="text-[8px] uppercase font-bold tracking-[0.2em] text-blue-400 italic">Optimisé pour Chrome</div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/5 p-2 px-4 rounded-xl text-[10px] font-bold border border-white/10 text-white uppercase italic">⚙️ Paramètres</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden bg-slate-900/90 p-6 rounded-3xl mb-8 border border-yellow-500/30">
            <p class="text-[10px] text-[#d4af37] font-bold uppercase mb-2">Clé API (Compte Payant)</p>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white outline-none mb-4 focus:border-yellow-500">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim()); location.reload();" class="w-full py-4 gold-btn text-[10px] uppercase font-bold tracking-widest">Enregistrer</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[50vh]">
            <div class="msg-ai">
                <b class="text-[#d4af37] uppercase text-[9px] tracking-widest block mb-2 italic">Mentor ITAA</b>
                Marouane, si Chrome est actif et que ta clé "Pay-as-you-go" est valide, l'IA doit répondre maintenant. <br><br>
                <b>Teste-moi sur un sujet complexe (ex: taxation des plus-values).</b>
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-5 right-5 max-w-2xl mx-auto flex gap-3 bg-[#020617]/80 backdrop-blur-xl p-2 rounded-[2.5rem] border border-white/10 shadow-2xl">
        <input type="text" id="userInput" placeholder="Question fiscale..." class="flex-1 bg-transparent p-5 rounded-[2rem] text-sm text-white outline-none">
        <button id="sendBtn" onclick="askAI()" class="w-16 h-16 gold-btn flex items-center justify-center shadow-2xl transition-transform active:scale-95 text-xl rounded-full">➔</button>
    </div>

    <script>
        async function askAI() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!key || !input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me shadow-lg animate-pulse">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            try {
                // Requête directe sans tunnel (Chrome permet plus de liberté)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Tu es le Mentor personnel de Marouane, futur expert-comptable ITAA. Réponds avec rigueur et cite les articles de loi belges. Question : " + input }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai mt-4 shadow-xl"><b class="text-[#d4af37] text-[9px] tracking-widest block mb-2 italic uppercase text-white">Expertise Fiscale</b>${text}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg-ai mt-4 border-red-500/50 text-red-400"><b>Blocage Chrome :</b> ${e.message}<br><br><span class="text-[10px]">Si "Location not supported", Google bloque encore l'IP belge. Dans ce cas, utilise le bouton Partager > Ajouter à l'écran d'accueil pour forcer le mode application.</span></div>`;
            } finally {
                btn.innerHTML = `➔`; btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
