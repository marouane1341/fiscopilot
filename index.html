<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FiscoPilot AI ELITE MAX 🇧🇪</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#0b2a3a,#081c29);
  color:white;
}

.container {
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
}

button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#2b6cb0;
  color:white;
}

input {
  padding:10px;
  width:100%;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.lesson {
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>📚 FiscoPilot AI ELITE MAX 🇧🇪</h1>
<p>Version stable • Base locale (infaillible)</p>

<div class="card">
  <h2>TVA Belgique</h2>

  <input id="search" placeholder="Rechercher...">

  <button onclick="showLessons()">Cours</button>
  <button onclick="showQCM()">QCM</button>
  <button onclick="showCases()">Cas</button>

  <div id="stats"></div>
</div>

<div id="content"></div>

</div>

<script>

/* =========================
   BASE DE DONNÉES
========================= */

const DB = {
  lessons: [
    {
      title: "Raisonnement TVA complet",
      level: "Débutant",
      text: "Méthode cabinet : 1) Champ TVA 2) Assujetti 3) Lieu 4) Taxable 5) Taux 6) Déduction"
    },
    {
      title: "Champ TVA",
      level: "Débutant",
      text: "4 conditions : opération économique, contrepartie, assujetti, territorialité"
    },
    {
      title: "Assujetti",
      level: "Intermédiaire",
      text: "Une personne est assujettie si elle exerce une activité économique indépendante"
    },
    {
      title: "Biens vs services",
      level: "Intermédiaire",
      text: "Bien = objet physique, service = tout le reste"
    },
    {
      title: "Déduction TVA",
      level: "Intermédiaire",
      text: "Conditions : facture + usage pro + lien direct"
    }
  ],

  qcm: [
    {
      question: "La TVA est :",
      choices: ["Un coût", "Neutre", "Optionnelle"],
      answer: 1
    },
    {
      question: "Première étape TVA :",
      choices: ["Taux", "Champ TVA", "Déduction"],
      answer: 1
    }
  ],

  cases: [
    {
      question: "Facture 1000€ + 21% TVA, achat 500€ HT, TVA à payer ?",
      answer: "210 - 105 = 105€"
    },
    {
      question: "Subvention sans contrepartie ?",
      answer: "Hors champ TVA"
    }
  ]
};

/* =========================
   STATS
========================= */

function updateStats() {
  document.getElementById("stats").innerHTML =
    `Cours: ${DB.lessons.length} • QCM: ${DB.qcm.length} • Cas: ${DB.cases.length}`;
}
updateStats();

/* =========================
   AFFICHAGE
========================= */

function showLessons() {
  const content = document.getElementById("content");
  const search = document.getElementById("search").value.toLowerCase();

  content.innerHTML = "";

  DB.lessons
    .filter(l => l.title.toLowerCase().includes(search) || l.text.toLowerCase().includes(search))
    .forEach(l => {
      content.innerHTML += `
        <div class="lesson">
          <h3>${l.title}</h3>
          <small>${l.level}</small>
          <p>${l.text}</p>
        </div>
      `;
    });
}

function showQCM() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  DB.qcm.forEach((q, i) => {
    let html = `<div class="lesson"><h3>${q.question}</h3>`;

    q.choices.forEach((c, index) => {
      html += `<button onclick="checkQCM(${i},${index})">${c}</button>`;
    });

    html += `</div>`;
    content.innerHTML += html;
  });
}

function checkQCM(i, choice) {
  if (choice === DB.qcm[i].answer) {
    alert("✅ Correct");
  } else {
    alert("❌ Faux");
  }
}

function showCases() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  DB.cases.forEach(c => {
    content.innerHTML += `
      <div class="lesson">
        <h3>${c.question}</h3>
        <button onclick="this.nextElementSibling.style.display='block'">Voir réponse</button>
        <p style="display:none">${c.answer}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
