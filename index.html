<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FiscoPilot</title>
  <link rel="stylesheet" href="style.css?v=1" />
</head>

<body>
  <header class="topbar">
    <button class="iconBtn" id="menuBtn">☰</button>
    <div class="brand">
      <div class="brandTitle">FiscoPilot <span class="accent">AI ELITE MAX</span> 🇧🇪</div>
      <div class="brandSub">Mode PWA • Offline-ready • Build STABLE</div>
    </div>
    <div class="pill" id="statusPill">En ligne</div>
  </header>

  <main class="container">
    <!-- PAGE MODULES -->
    <section id="pageModules" class="page active">
      <h1 class="h1">Modules</h1>
      <p class="muted">Choisis un module. Cours + QCM + Cas, recherche et aléatoire.</p>

      <div class="card">
        <div class="row between">
          <div class="moduleTitle">
            <div class="moduleIcon">📚</div>
            <div>
              <div class="moduleName">TVA Belgique</div>
              <div class="moduleMeta">Sources: <span id="sourcesCount">—</span></div>
            </div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" id="btnCours">📘 Cours</button>
          <button class="tab" id="btnQcm">🧪 QCM</button>
          <button class="tab" id="btnCas">🧾 Cas</button>
        </div>

        <div class="row gap">
          <input id="searchInput" class="input" placeholder="Rechercher (ex: prorata, facture, 4 conditions…)" />
          <button class="btn" id="randomBtn">Aléatoire</button>
        </div>

        <div class="counts" id="moduleCounts">Cours: 0 • QCM: 0 • Cas: 0</div>

        <div class="hint" id="dbHint"></div>
      </div>

      <div class="actions">
        <button class="btnWide" id="openFirstLessonBtn">Ouvrir le 1er cours</button>
      </div>
    </section>

    <!-- PAGE COURS -->
    <section id="pageLesson" class="page">
      <div class="lessonHeader">
        <button class="btnSmall" id="backBtn">← Retour</button>
        <div class="lessonTitleWrap">
          <div class="lessonTitle" id="lessonTitle">Titre</div>
          <div class="lessonLevel" id="lessonLevel">Niveau</div>
        </div>
      </div>

      <pre class="lessonContent" id="lessonContent">Contenu…</pre>

      <div class="lessonFooter">
        <button class="btnSmall" id="prevBtn">◀ Précédent</button>
        <button class="btnAudio" id="audioBtn">🔊 Audio</button>
        <button class="btnSmall" id="nextBtn">Suivant ▶</button>
      </div>

      <div class="muted small" id="audioInfo"></div>
    </section>
  </main>

  <script src="app.js?v=1"></script>
</body>
</html>
