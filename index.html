<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json?v=37" />

  <!-- ✅ IMPORTANT: bump version to bypass cache -->
  <link rel="stylesheet" href="styles.css?v=37" />

  <title>FiscoPilot AI ELITE MAX</title>
</head>

<body>
  <!-- Background -->
  <div class="bg"></div>

  <header class="topbar">
    <button class="iconBtn" id="btnMenu" aria-label="Menu">
      <span class="icon">≡</span>
    </button>

    <div class="brand">
      <div class="brandTitle">FiscoPilot <span class="gold">AI ELITE MAX</span> 🇧🇪</div>
      <div class="brandSub">Mode PWA • Offline-ready • Build <span id="buildNum">37</span></div>
    </div>

    <div class="right">
      <div class="pill online" id="netPill">En ligne</div>
    </div>
  </header>

  <!-- Drawer -->
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawerHead">
      <div class="drawerTitle">Menu</div>
      <button class="iconBtn" id="btnClose" aria-label="Fermer">
        <span class="icon">×</span>
      </button>
    </div>

    <div class="drawerBody">
      <button class="navBtn" id="navModules">📚 Modules</button>
      <button class="navBtn" id="navForceRefresh">🔁 Forcer refresh (anti-bug)</button>
      <div class="hint">
        Astuce : si tu modifies les JSON, incrémente <b>v=37</b> ici (index.html) et <b>CACHE_NAME</b> dans sw.js.
      </div>
    </div>
  </aside>

  <!-- App -->
  <main class="container" id="app"></main>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modalSheet">
      <div class="modalTop">
        <div class="modalMeta">
          <button class="iconBtn" id="modalClose" aria-label="Fermer"><span class="icon">×</span></button>
          <div class="pill" id="modalLevel">Niveau</div>
          <div class="pill" id="modalPos">1/1</div>
        </div>
        <button class="iconBtn" id="modalMenu" aria-label="Menu"><span class="icon">≡</span></button>
      </div>

      <div class="modalBody" id="modalBody"></div>

      <div class="modalBottom">
        <button class="btn ghost" id="prevBtn">◀ Précédent</button>
        <button class="btn primary" id="nextBtn">Suivant ▶</button>
      </div>
    </div>
  </div>

  <!-- ✅ Important: JS with version -->
  <script src="app.js?v=37"></script>

  <!-- ✅ Anti-cache / Force refresh killer (works even if app.js has issues) -->
  <script>
    async function killAllCachesAndSW() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch(e) {}
    }

    // Drawer open/close (safe basic)
    const drawer = document.getElementById('drawer');
    document.getElementById('btnMenu').onclick = () => drawer.setAttribute('aria-hidden','false');
    document.getElementById('btnClose').onclick = () => drawer.setAttribute('aria-hidden','true');
    document.getElementById('modalMenu').onclick = () => drawer.setAttribute('aria-hidden','false');

    // Force refresh button
    document.getElementById('navForceRefresh').onclick = async () => {
      await killAllCachesAndSW();
      location.reload(true);
    };

    // Online/offline badge
    const pill = document.getElementById('netPill');
    function updateNet(){
      if(navigator.onLine){
        pill.textContent = "En ligne";
        pill.classList.remove("offline");
        pill.classList.add("online");
      } else {
        pill.textContent = "Hors ligne";
        pill.classList.remove("online");
        pill.classList.add("offline");
      }
    }
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);
    updateNet();
  </script>
</body>
</html>
