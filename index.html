<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FiscoPilot AI ELITE MAX</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b1528">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <button id="menuBtn" class="iconBtn" aria-label="Menu">☰</button>

    <div class="brand">
      <div class="brandTitle">FiscoPilot <span class="gold">AI ELITE MAX</span> 🇧🇪</div>
      <div class="brandSub" id="netStatus">Mode PWA • Offline-ready</div>
    </div>

    <button id="onlineBadge" class="badgeOnline" type="button">—</button>
  </header>

  <!-- Drawer Menu -->
  <aside id="drawer" class="drawer hidden">
    <div class="drawerHeader">
      <div class="drawerTitle">Menu</div>
      <button id="drawerClose" class="iconBtn" aria-label="Fermer">✕</button>
    </div>
    <nav class="drawerNav">
      <button class="navItem active" data-page="modules">📚 Modules</button>
      <button class="navItem" data-page="dashboard">🏠 Dashboard</button>
      <button class="navItem" data-page="quiz">🧪 Quiz</button>
      <button class="navItem" data-page="exam">📝 Examen</button>
      <button class="navItem" data-page="ai">🤖 Prof IA</button>
      <button class="navItem" data-page="flash">🧠 Flashcards</button>
      <button class="navItem" data-page="stats">📊 Stats</button>
      <button class="navItem" data-page="settings">⚙️ Paramètres</button>
    </nav>
  </aside>
  <div id="drawerBackdrop" class="drawerBackdrop hidden"></div>

  <main class="wrap">
    <section id="pageModules" class="page">
      <h1 class="h1">Modules</h1>

      <div id="modulesList" class="cards"></div>

      <div id="moduleView" class="moduleView hidden">
        <div class="moduleTop">
          <div>
            <div class="h2" id="moduleTitle">—</div>
            <div class="muted" id="moduleMeta">—</div>
          </div>
          <button id="backToModules" class="btn ghost">← Retour</button>
        </div>

        <div class="segmented">
          <button id="tabLessons" class="seg active">📘 Cours</button>
          <button id="tabQcm" class="seg">🧪 QCM</button>
          <button id="tabCases" class="seg">🧾 Cas</button>
        </div>

        <!-- Lessons panel -->
        <div id="panelLessons" class="panel">
          <div class="panelHead">
            <button id="lessonRandom" class="btn">Cours aléatoire</button>
            <button id="lessonPrev" class="btn ghost">◀ Précédent</button>
            <button id="lessonNext" class="btn ghost">Suivant ▶</button>
          </div>
          <div id="lessonsList" class="list"></div>
        </div>

        <!-- QCM panel -->
        <div id="panelQcm" class="panel hidden">
          <div class="panelHead">
            <button id="qcm5" class="btn">Lancer 5 questions</button>
            <button id="qcm10" class="btn ghost">Lancer 10 questions</button>
          </div>
          <div id="qcmBox" class="box"></div>
        </div>

        <!-- Cases panel -->
        <div id="panelCases" class="panel hidden">
          <div class="panelHead">
            <button id="caseRandom" class="btn">Cas aléatoire</button>
          </div>
          <div id="caseBox" class="box"></div>
        </div>
      </div>

      <div id="errorBox" class="errorBox hidden"></div>
    </section>

    <!-- pages placeholders -->
    <section id="pageDashboard" class="page hidden">
      <h1 class="h1">Dashboard</h1>
      <p class="muted">Bienvenue dans FiscoPilot AI ELITE MAX.</p>
    </section>

    <section id="pageQuiz" class="page hidden"><h1 class="h1">Quiz</h1></section>
    <section id="pageExam" class="page hidden"><h1 class="h1">Examen</h1></section>
    <section id="pageAI" class="page hidden"><h1 class="h1">Prof IA</h1></section>
    <section id="pageFlash" class="page hidden"><h1 class="h1">Flashcards</h1></section>
    <section id="pageStats" class="page hidden"><h1 class="h1">Stats</h1></section>
    <section id="pageSettings" class="page hidden"><h1 class="h1">Paramètres</h1></section>
  </main>

  <!-- Reader Premium (modal plein écran) -->
  <div id="readerModal" class="readerModal hidden" role="dialog" aria-modal="true">
    <div class="readerTop">
      <button id="readerClose" class="iconBtn" aria-label="Fermer">✕</button>
      <div class="readerTopTitle">
        <div id="readerTitle" class="readerTitle">Cours</div>
        <div id="readerMeta" class="readerMeta">—</div>
      </div>
      <button id="readerToc" class="iconBtn" aria-label="Sommaire">≡</button>
    </div>

    <div id="readerBody" class="readerBody"></div>

    <div class="readerBottom">
      <button id="readerPrev" class="btn ghost">◀ Précédent</button>
      <button id="readerNext" class="btn">Suivant ▶</button>
    </div>

    <!-- Sommaire (drawer) -->
    <div id="tocDrawer" class="tocDrawer hidden">
      <div class="tocHeader">
        <div class="tocTitle">Sommaire</div>
        <button id="tocClose" class="iconBtn" aria-label="Fermer sommaire">✕</button>
      </div>
      <div class="tocSearchWrap">
        <input id="tocSearch" class="tocSearch" placeholder="Rechercher un cours..." />
      </div>
      <div id="tocList" class="tocList"></div>
    </div>

    <div id="tocBackdrop" class="tocBackdrop hidden"></div>
  </div>

  <script src="app.js"></script>
  <script>
    // register SW
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(()=>{});
    }
  </script>
</body>
</html>
