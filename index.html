<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscoPilot V12 - Professional Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-text { color: var(--gold); }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 20px 20px 20px; }
        .msg-me { background: var(--gold); color: black; font-weight: bold; border-radius: 20px 0 20px 20px; margin-left: 20%; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-black gold-text italic tracking-tighter">FISCOPILOT V12</h1>
            <div id="status" class="text-[9px] uppercase font-bold text-gray-500 tracking-widest">Initialisation...</div>
        </div>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/5 p-2 rounded-full border border-white/10 text-lg">⚙️</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden glass p-6 rounded-3xl mb-8 border-2 border-yellow-500/20">
            <label class="text-[10px] font-bold uppercase gold-text">1. URL du Pont Vercel</label>
            <input type="text" id="bridgeUrl" placeholder="https://votre-projet.vercel.app" class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4 mt-2">
            
            <label class="text-[10px] font-bold uppercase gold-text">2. Clé API Google</label>
            <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white mb-4 mt-2">
            
            <button onclick="saveConfig()" class="w-full py-4 gold-btn rounded-2xl text-xs uppercase tracking-widest shadow-lg">Enregistrer & Débloquer</button>
        </div>

        <div id="chat" class="space-y-6 min-h-[60vh] pb-10">
            <div class="msg-ai p-5 shadow-2xl">
                <b class="gold-text">MENTOR ITAA :</b><br>
                L'architecture V12 est prête. Une fois ton <b>Pont Vercel</b> et ta <b>Clé API</b> configurés, je serai libéré des restrictions géographiques.
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-5 right-5 max-w-2xl mx-auto flex gap-3">
        <input type="text" id="userInput" placeholder="Interrogez votre mentor..." class="flex-1 bg-slate-900 border border-white/10 p-5 rounded-3xl text-sm text-white outline-none focus:ring-2 focus:ring-yellow-500/50">
        <button id="sendBtn" onclick="askExpert()" class="w-16 gold-btn rounded-3xl flex items-center justify-center shadow-xl">➔</button>
    </div>

    <script>
        function saveConfig() {
            localStorage.setItem('fp_bridge', document.getElementById('bridgeUrl').value.trim());
            localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim());
            document.getElementById('config').classList.add('hidden');
            checkStatus();
        }

        function checkStatus() {
            const status = document.getElementById('status');
            if(localStorage.getItem('fp_bridge') && localStorage.getItem('fp_key')) {
                status.innerText = "● Pont Établi";
                status.classList.replace('text-gray-500', 'text-emerald-500');
            }
        }

        async function askExpert() {
            const bridge = localStorage.getItem('fp_bridge');
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            
            if(!bridge || !key) { alert("Configurez d'abord le pont et la clé !"); return; }
            if(!input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            
            chat.innerHTML += `<div class="msg-me p-5 shadow-lg">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;
            window.scrollTo(0, document.body.scrollHeight);

            try {
                const response = await fetch(`${bridge}/api/mentor`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: input, apiKey: key })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                chat.innerHTML += `<div class="msg-ai p-5 shadow-2xl mt-4"><b class="gold-text">MENTOR :</b><br>${text}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg-ai p-5 text-red-400 mt-4 italic"><b>Erreur :</b> Impossible de joindre le pont Vercel. Vérifie l'URL.</div>`;
            } finally {
                btn.innerHTML = `➔`;
                btn.disabled = false;
                window.scrollTo(0, document.body.scrollHeight);
            }
        }
        checkStatus();
    </script>
</body>
</html>
