<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FiscoPilot AI ELITE MAX 🇧🇪</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#0b2a3a,#081c29);
  color:white;
}

.container {
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
}

button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#2b6cb0;
  color:white;
}

.lesson {
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 FiscoPilot AI ELITE MAX 🇧🇪</h1>

<div class="card">
  <button onclick="showList()">📋 Liste</button>
  <button onclick="startLearning()">🚀 Commencer</button>
</div>

<div id="listView"></div>
<div id="lessonView" class="hidden"></div>

</div>

<script>

const DB = {
  lessons: [
    { title: "Raisonnement TVA", level:"Débutant", text:"1) Champ TVA 2) Assujetti 3) Lieu 4) Taxable 5) Taux 6) Déduction" },
    { title: "Champ TVA", level:"Débutant", text:"4 conditions : opération économique, contrepartie, assujetti, territorialité" },
    { title: "Assujetti", level:"Intermédiaire", text:"Activité économique indépendante" },
    { title: "Biens vs services", level:"Intermédiaire", text:"Bien = physique, service = reste" },
    { title: "Déduction TVA", level:"Intermédiaire", text:"Facture + usage pro + lien direct" }
  ]
};

let index = 0;

/* =========================
   LISTE
========================= */

function showList() {
  document.getElementById("lessonView").classList.add("hidden");
  const list = document.getElementById("listView");
  list.innerHTML = "";

  DB.lessons.forEach((l, i) => {
    list.innerHTML += `
      <div class="lesson" onclick="openLesson(${i})">
        <h3>${l.title}</h3>
        <small>${l.level}</small>
      </div>
    `;
  });
}

/* =========================
   MODE APPRENTISSAGE
========================= */

function startLearning() {
  index = 0;
  openLesson(index);
}

function openLesson(i) {
  index = i;

  document.getElementById("listView").innerHTML = "";
  document.getElementById("lessonView").classList.remove("hidden");

  const l = DB.lessons[index];

  document.getElementById("lessonView").innerHTML = `
    <div class="card">
      <h2>${l.title}</h2>
      <small>${l.level}</small>
      <p>${l.text}</p>

      <button onclick="prev()">⬅ Précédent</button>
      <button onclick="next()">➡ Suivant</button>
    </div>
  `;
}

function next() {
  if (index < DB.lessons.length - 1) {
    index++;
    openLesson(index);
  }
}

function prev() {
  if (index > 0) {
    index--;
    openLesson(index);
  }
}

/* INIT */
showList();

</script>

</body>
</html>
