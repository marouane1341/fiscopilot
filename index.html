<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FiscoPilot AI ELITE MAX 🇧🇪</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">FiscoPilot <span class="gold">AI ELITE MAX 🇧🇪</span></div>
  <button id="btnMenu" class="iconbtn" aria-label="Menu">☰</button>
</header>

<!-- overlay pour fermer en cliquant dehors -->
<div id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:15;"></div>

<nav class="sidebar" id="sidebar" style="z-index:20;">
  <button class="navitem" data-view="dashboard">🏠 Dashboard</button>
  <button class="navitem" data-view="modules">📚 Modules</button>
  <button class="navitem" data-view="quiz">🧪 Quiz</button>
  <button class="navitem" data-view="exam">📝 Examen</button>
  <button class="navitem" data-view="tutor">🤖 Prof IA</button>
  <button class="navitem" data-view="flashcards">🧠 Flashcards</button>
  <button class="navitem" data-view="stats">📊 Stats</button>
  <button class="navitem" data-view="settings">⚙️ Paramètres</button>
</nav>

<main class="content">

  <section id="view-dashboard" class="view active">
    <h1>Dashboard</h1>
    <button class="btn" onclick="syncNow()">Mettre à jour maintenant</button>
    <div id="syncStatus" class="muted" style="margin-top:8px;"></div>
  </section>

  <section id="view-modules" class="view">
    <h1>Modules</h1>
    <div id="modulesList" class="muted">Module TVA arrive ici quand on l’ajoute.</div>
  </section>

  <section id="view-quiz" class="view"><h1>Quiz</h1><div class="muted">Bientôt.</div></section>
  <section id="view-exam" class="view"><h1>Examen blanc</h1><div class="muted">Bientôt.</div></section>

  <section id="view-tutor" class="view">
    <h1>Prof IA</h1>
    <input id="tutorQ" class="input" placeholder="Pose une question (TVA, ISOC, PCMN...)" />
    <div class="row" style="margin-top:10px;">
      <button class="btn" onclick="tutorAskOffline()">Répondre</button>
    </div>
    <div id="tutorA" class="answer"></div>
  </section>

  <section id="view-flashcards" class="view"><h1>Flashcards</h1><div class="muted">Bientôt.</div></section>
  <section id="view-stats" class="view"><h1>Statistiques</h1><div class="muted">Bientôt.</div></section>
  <section id="view-settings" class="view"><h1>Paramètres</h1><div class="muted">Bientôt.</div></section>

</main>

<script src="sync.js"></script>
<script src="app.js"></script>

<script>
  // ✅ navigation + menu qui se ferme
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const btnMenu = document.getElementById("btnMenu");

  function openMenu(){
    sidebar.classList.add("open");
    overlay.style.display = "block";
  }
  function closeMenu(){
    sidebar.classList.remove("open");
    overlay.style.display = "none";
  }

  btnMenu.addEventListener("click", () => {
    if(sidebar.classList.contains("open")) closeMenu();
    else openMenu();
  });

  overlay.addEventListener("click", closeMenu);

  function setView(name){
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    const el = document.getElementById("view-" + name);
    if(el) el.classList.add("active");
    closeMenu(); // ✅ ferme le menu après clic
  }

  document.querySelectorAll(".navitem").forEach(btn=>{
    btn.addEventListener("click", ()=> setView(btn.dataset.view));
  });

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // si app.js n'a pas défini ces fonctions (sécurité), on évite crash
  window.syncNow = window.syncNow || (async ()=> {
    if(window.__syncNow) await window.__syncNow();
  });

  window.tutorAskOffline = window.tutorAskOffline || (()=> {
    const q = document.getElementById("tutorQ").value.trim();
    document.getElementById("tutorA").textContent = q ? "Mode local: base minimale (on enrichit ensuite)." : "Pose une question.";
  });
</script>

</body>
</html>
