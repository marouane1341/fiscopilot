<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FISCOPILOT ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #f9e27d 100%); color: black; font-weight: 800; border-radius: 1.2rem; }
        .msg-ai { background: #1e293b; border-left: 4px solid var(--gold); border-radius: 0 1.5rem 1.5rem 1.5rem; padding: 1.2rem; }
        .msg-me { background: var(--gold); color: black; font-weight: 700; border-radius: 1.5rem 0 1.5rem 1.5rem; padding: 1.2rem; margin-left: 10%; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="p-6 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#020617]/95 backdrop-blur-md z-50">
        <h1 class="text-xl font-black text-[#d4af37] italic tracking-tighter">FISCOPILOT V21</h1>
        <button onclick="document.getElementById('config').classList.toggle('hidden')" class="bg-white/10 p-2 px-4 rounded-xl text-[10px] font-bold text-white uppercase italic border border-white/10 text-white">⚙️</button>
    </header>

    <main class="p-5 max-w-2xl mx-auto">
        <div id="config" class="hidden bg-slate-900/90 p-6 rounded-3xl mb-8 border border-yellow-500/30">
            <input type="password" id="apiKey" placeholder="Ta clé API..." class="w-full bg-black border border-white/10 p-4 rounded-2xl text-xs text-white outline-none mb-4">
            <button onclick="localStorage.setItem('fp_key', document.getElementById('apiKey').value.trim()); location.reload();" class="w-full py-4 gold-btn text-[10px] uppercase font-bold tracking-widest text-black">ENREGISTRER</button>
        </div>

        <div id="chat" class="space-y-6">
            <div class="msg-ai"><b>Mentor :</b> Marouane, j'ai recalibré les noms de modèles. <br><br>Pose ta question maintenant.</div>
        </div>
    </main>

    <div class="fixed bottom-8 left-5 right-5 max-w-2xl mx-auto flex gap-3 bg-[#020617]/80 backdrop-blur-xl p-2 rounded-[2.5rem] border border-white/10">
        <input type="text" id="userInput" placeholder="Question fiscale..." class="flex-1 bg-transparent p-5 rounded-[2rem] text-sm text-white outline-none">
        <button id="sendBtn" onclick="askAI()" class="w-16 h-16 gold-btn flex items-center justify-center text-xl rounded-full font-bold shadow-lg text-black">➔</button>
    </div>

    <script>
        async function askAI() {
            const key = localStorage.getItem('fp_key');
            const input = document.getElementById('userInput').value.trim();
            if(!key || !input) return;

            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            chat.innerHTML += `<div class="msg-me shadow-lg text-black">${input}</div>`;
            document.getElementById('userInput').value = "";
            btn.innerHTML = `<div class="loader"></div>`;
            btn.disabled = true;

            // Test de deux versions de modèles pour les comptes payants
            const models = ["gemini-1.5-flash-latest", "gemini-1.5-flash"];
            let success = false;

            for (let modelName of models) {
                if(success) break;
                try {
                    const url = `https://generativelanguage.googleapis.com/v1/models/${modelName}:generateContent?key=${key}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Expert ITAA Belgique. Question : " + input }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content) {
                        const text = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                        chat.innerHTML += `<div class="msg-ai mt-4 text-white"><b>Mentor :</b><br>${text}</div>`;
                        success = true;
                    }
                } catch (e) { console.error("Essai suivant..."); }
            }

            if(!success) {
                chat.innerHTML += `<div class="msg-ai mt-4 text-red-400">Dernier verrou détecté. Vérifie que ta clé API est bien issue d'un projet Google Cloud avec Billing actif.</div>`;
            }

            btn.innerHTML = `➔`; btn.disabled = false;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
